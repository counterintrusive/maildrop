<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maildrop+ — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/forms.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='resources/favicon.ico') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>
                <img src="{{ url_for('static', filename='resources/mail-icon.svg') }}" alt="Mail Icon">
                maildrop+
            </h1>
            <p>Create an account to get your API key</p>
        </header>

        <section class="email-panel">
            <div id="register-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="At least 8 characters" required autocomplete="new-password" minlength="8">
                </div>
                <div class="form-group">
                    <label for="password-confirm">Confirm Password</label>
                    <input type="password" id="password-confirm" class="form-control" placeholder="Repeat your password" required autocomplete="new-password">
                </div>
                <div id="register-error" class="modal-error" style="display:none;"></div>
                <div class="modal-actions" style="justify-content: space-between;">
                    <a href="{{ url_for('auth.login_page') }}" style="color: var(--primary-color); font-size: 0.9rem;">Already have an account?</a>
                    <button type="button" class="btn btn-primary" id="register-btn">Create Account</button>
                </div>
            </div>
        </section>

        <section class="email-panel" style="text-align: center;">
            <p style="color: var(--text-dark-color);">
                <a href="{{ url_for('pages.index') }}" style="color: var(--primary-color);">Continue as guest</a>
                — no account needed to use disposable emails
            </p>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const confirmInput = document.getElementById("password-confirm");
            const registerBtn = document.getElementById("register-btn");
            const errorEl = document.getElementById("register-error");

            async function register() {
                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value;
                const confirm = confirmInput.value;

                if (!email || !password) {
                    errorEl.textContent = "Email and password are required";
                    errorEl.style.display = "block";
                    return;
                }

                if (password.length < 8) {
                    errorEl.textContent = "Password must be at least 8 characters";
                    errorEl.style.display = "block";
                    return;
                }

                if (password !== confirm) {
                    errorEl.textContent = "Passwords do not match";
                    errorEl.style.display = "block";
                    return;
                }

                registerBtn.disabled = true;
                registerBtn.textContent = "Creating account...";
                errorEl.style.display = "none";

                try {
                    const response = await fetch("/auth/register", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password }),
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || "Registration failed");
                    }

                    // Auto-login: store the session cookie was set, redirect
                    window.location.href = "/";
                } catch (err) {
                    errorEl.textContent = err.message;
                    errorEl.style.display = "block";
                    registerBtn.disabled = false;
                    registerBtn.textContent = "Create Account";
                }
            }

            registerBtn.addEventListener("click", register);
            confirmInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") register();
            });
        });
    </script>
</body>
</html>
